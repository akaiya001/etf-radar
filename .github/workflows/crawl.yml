name: ETF每日爬蟲

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: pip install requests beautifulsoup4 lxml

      - name: 執行爬蟲
        run: python etf_crawler.py

      - name: 提交資料
        run: |
          git config user.name "ETF Bot"
          git config user.email "bot@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "每日更新 $(date +%Y-%m-%d)"
          git push
