<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>台股主動ETF 每日持股雷達榜</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--bg2:#111318;--bg3:#181c24;--bg4:#1e222d;
  --border:#252a35;--border2:#2d3342;--border3:#374052;
  --text:#e2e6f0;--text2:#8b92a8;--text3:#555e72;
  --green:#22c55e;--gdim:#16532d;--gbg:#0d2e1a;
  --red:#ef4444;--rdim:#7f1d1d;--rbg:#2a0d0d;
  --amber:#f59e0b;--abg:#2a1f08;
  --blue:#60a5fa;--bbg:#0d1a36;
  --cyan:#22d3ee;--cbg:#071f2a;
  --purple:#a78bfa;--pbg:#1a1030;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Noto Sans TC',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;}

/* Topbar */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--cyan);}
.live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-r{font-family:var(--mono);font-size:10px;color:var(--text3);}
.topbar-r b{color:var(--text2);}

/* Nav Tabs */
.nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.nav-tab{padding:9px 16px;font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;}
.nav-tab:hover{color:var(--text2);}
.nav-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* Sumbar */
.sumbar{display:flex;gap:6px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:wrap;}
.chip{flex-shrink:0;display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-family:var(--mono);font-size:10px;}
.chip .n{font-size:15px;font-weight:600;}.chip .l{color:var(--text3);font-size:9px;}
.chip.b .n{color:var(--green)}.chip.nw .n{color:var(--amber)}.chip.s .n{color:var(--red)}
.chip.r .n{color:var(--purple)}.chip.e .n{color:var(--blue)}

/* Section */
.sec{padding:10px 16px 0;}
.sec-hd{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.sec-dot{width:7px;height:7px;border-radius:50%;}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono);}
.sec-ct{font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:1px 5px;border-radius:3px;}
.sec-hd.b .sec-dot{background:var(--green)}.sec-hd.b .sec-title{color:var(--green)}
.sec-hd.nw .sec-dot{background:var(--amber)}.sec-hd.nw .sec-title{color:var(--amber)}
.sec-hd.s .sec-dot{background:var(--red)}.sec-hd.s .sec-title{color:var(--red)}
.sec-hd.r .sec-dot{background:var(--purple)}.sec-hd.r .sec-title{color:var(--purple)}

/* Grid & Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:7px;margin-bottom:4px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:9px 11px;cursor:pointer;transition:.15s;}
.card:hover{border-color:var(--border3);background:var(--bg3);}
.card.b{border-left:3px solid var(--green)}.card.nw{border-left:3px solid var(--amber)}
.card.s{border-left:3px solid var(--red)}.card.r{border-left:3px solid var(--purple)}
.card.active{border-color:var(--cyan)!important;background:var(--cbg)!important;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.s-code{font-family:var(--mono);font-size:17px;font-weight:600;line-height:1.1;}
.s-name{font-size:11px;color:var(--text2);margin-top:1px;}
.s-ind{font-size:9px;color:var(--text3);margin-top:1px;}
.p-block{text-align:right;}
.price{font-family:var(--mono);font-size:15px;font-weight:600;}
.pchg{font-family:var(--mono);font-size:10px;font-weight:500;}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--text2)}
.etags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;}
.etag{display:inline-flex;align-items:center;gap:3px;border-radius:3px;padding:2px 5px;font-family:var(--mono);font-size:9px;border:1px solid;line-height:1.4;}
.etag.add{background:var(--gbg);border-color:var(--gdim);color:var(--green)}
.etag.reduce{background:var(--rbg);border-color:var(--rdim);color:var(--red)}
.etag.new-in{background:var(--abg);border-color:#78350f;color:var(--amber)}
.etag.removed{background:var(--rbg);border-color:var(--rdim);color:#fca5a5}
.etag.hold{background:var(--bg3);border-color:var(--border);color:var(--text3)}
.etag .rk{background:rgba(255,255,255,.07);border-radius:2px;padding:0 3px;margin-left:2px;}
.etag .wc{font-weight:700;margin-left:2px;}
.etag .wc.up{color:#4ade80}.etag .wc.down{color:#f87171}
.card-bot{display:flex;align-items:center;justify-content:space-between;margin-top:5px;padding-top:5px;border-top:1px solid var(--border);}
.etf-cnt{font-family:var(--mono);font-size:9px;color:var(--text3);}
.etf-cnt span{color:var(--blue);font-weight:600;}
.total-wchg{font-family:var(--mono);font-size:10px;font-weight:700;}
.hint{font-family:var(--mono);font-size:9px;color:var(--cyan);opacity:.45;margin-top:4px;}

/* Stale Warning */
.stale-bar{background:var(--rbg);border-bottom:1px solid var(--rdim);padding:5px 16px;font-size:11px;color:#fca5a5;font-family:var(--mono);}

/* Misc */
.notice{padding:8px 10px;background:var(--abg);border:1px solid #78350f;border-radius:4px;font-size:11px;color:var(--amber);margin-bottom:10px;}
.loading-screen{text-align:center;padding:60px;font-family:var(--mono);font-size:12px;color:var(--text3);}
.loading-screen span{color:var(--cyan);animation:blink 1s infinite;}
.no-data{text-align:center;padding:30px;color:var(--text3);font-size:12px;}
.footer{padding:16px;font-family:var(--mono);font-size:10px;color:var(--text3);text-align:center;border-top:1px solid var(--border);margin-top:16px;}
.pb16{padding-bottom:16px;}

/* ── 以下 Step2~4 會繼續補上 ── */
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="live"></div>
    <span class="logo">ETF雷達榜</span>
    <span style="color:var(--text3);font-family:var(--mono);font-size:10px;">台股主動ETF · 每日持股變動</span>
  </div>
  <div class="topbar-r" id="topbar-date">載入中...</div>
</div>

<!-- Nav -->
<div class="nav">
  <div class="nav-tab active" onclick="showTab('radar',this)">📡 每日雷達榜</div>
  <div class="nav-tab" onclick="showTab('etf',this)">📋 ETF持股明細</div>
  <div class="nav-tab" onclick="showTab('removed',this)">🚫 剔除個股</div>
  <div class="nav-tab" onclick="showTab('ai',this)">🤖 AI經理人分析</div>
</div>

<!-- 日期選擇列 -->
<div id="date-bar" style="display:flex;align-items:center;gap:8px;padding:7px 16px;
     background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:wrap;">
  <span style="font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;">📅 觀看日期：</span>
  <div id="date-btns" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
</div>

<!-- Sumbar -->
<div class="sumbar" id="sumbar"></div>

<!-- Stale Warning -->
<div id="stale-bar" style="display:none;" class="stale-bar"></div>

<!-- Tab: 雷達榜 -->
<div id="tab-radar">
  <div id="radar-content">
    <div class="loading-screen"><span>▶ 讀取每日持股變動...</span></div>
  </div>
</div>

<!-- Tab: ETF持股明細（Step3補完） -->
<div id="tab-etf" style="display:none;">
  <div style="padding:12px 16px;">
    <div id="etf-btn-row" style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;"></div>
    <div id="etf-content"></div>
  </div>
</div>

<!-- Tab: 剔除個股（Step3補完） -->
<div id="tab-removed" style="display:none;">
  <div style="padding:12px 16px;">
    <div class="sec-hd r" style="margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);">
      <div class="sec-dot" style="background:var(--purple)"></div>
      <span class="sec-title" style="color:var(--purple)">ETF完全剔除個股</span>
    </div>
    <div id="removed-content"></div>
  </div>
</div>

<!-- Tab: AI分析（Step4補完） -->
<div id="tab-ai" style="display:none;">
  <div style="padding:12px 16px;" id="ai-section"></div>
</div>

<!-- 個股詳情面板（Step2補完） -->
<div id="dp" style="display:none;margin:10px 16px 0;background:var(--bg2);border:1px solid var(--border3);border-radius:8px;overflow:hidden;">
  <div style="background:var(--bg3);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div>
      <div><span id="dp-code" style="font-family:var(--mono);font-size:20px;font-weight:600;"></span><span id="dp-name" style="font-size:13px;color:var(--text2);margin-left:8px;"></span></div>
      <div id="dp-ind" style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:3px;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="display:flex;align-items:baseline;gap:8px;">
        <span id="dp-price" style="font-family:var(--mono);font-size:18px;font-weight:600;"></span>
        <span id="dp-chg" style="font-family:var(--mono);font-size:12px;font-weight:600;"></span>
      </div>
      <button onclick="closeDP()" style="background:transparent;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;">✕</button>
    </div>
  </div>
  <div id="dp-tabs" style="display:flex;border-bottom:1px solid var(--border);overflow-x:auto;"></div>
  <div id="dp-body" style="padding:12px 14px;"></div>
</div>

<div class="footer pb16">台股主動ETF每日持股雷達榜 · 資料來源：etf.idigi.tw · 每日18:00後更新</div>

<script>
// ── 全域資料 ──
const DATA_URL    = './data/holdings.json';
const HISTORY_URL = './data/history.json';
const GEMINI_KEY   = '';  // 填入你的 Google Gemini API Key
// 免費申請：https://aistudio.google.com/apikey
const GEMINI_MODEL = 'gemini-2.0-flash';

const ACT_LBL = {add:'加碼','new-in':'新進',reduce:'減碼',removed:'剔除',hold:'持平'};
const ACT_CSS = {add:'add','new-in':'new-in',reduce:'reduce',removed:'removed',hold:'hold'};

let G={}, HIST={}, STOCKS={};
let activeCode=null, dpTab='kline', mainTab='radar', activeEtf=null;
let aiHistory=[], dpCharts={};

// ── 載入資料 ──
let SELECTED_DATE = null;  // null = 最新日期

async function init(){
  try{
    const [r1,r2] = await Promise.all([
      fetch(DATA_URL+'?t='+Date.now()),
      fetch(HISTORY_URL+'?t='+Date.now()).catch(()=>({ok:false}))
    ]);
    if(!r1.ok) throw new Error('holdings.json 載入失敗');
    G = await r1.json();
    if(r2.ok) HIST = await r2.json();
    buildDateBar();
    render();
  } catch(e){
    document.getElementById('radar-content').innerHTML=
      `<div class="no-data">⚠ ${e.message}<br><small>請確認爬蟲已執行並 push 到 GitHub</small></div>`;
  }
}

// ── 建立日期選擇列 ────────────────────────────
function buildDateBar(){
  const dates = Object.keys(HIST).sort().reverse().slice(0, 10);
  if(!dates.length){
    document.getElementById('date-bar').style.display = 'none';
    return;
  }

  // 預設選最新日期
  SELECTED_DATE = dates[0];

  const btns = dates.map((date, idx) => {
    const label = date.slice(5); // MM-DD
    const isLatest = idx === 0;
    return `<button id="dbtn-${date}" onclick="selectDate('${date}')"
      style="font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:4px;
             cursor:pointer;border:1px solid var(--border);transition:.15s;white-space:nowrap;
             background:${isLatest?'var(--bbg)':'var(--bg3)'};
             color:${isLatest?'var(--blue)':'var(--text2)'};
             border-color:${isLatest?'var(--blue)':'var(--border)'};">
      ${isLatest?'今日 ':''}${label}
    </button>`;
  }).join('');

  document.getElementById('date-btns').innerHTML = btns;
}

function selectDate(date){
  SELECTED_DATE = date;

  // 更新按鈕樣式
  document.querySelectorAll('[id^="dbtn-"]').forEach(b => {
    const isActive = b.id === 'dbtn-' + date;
    b.style.background    = isActive ? 'var(--bbg)'    : 'var(--bg3)';
    b.style.color         = isActive ? 'var(--blue)'   : 'var(--text2)';
    b.style.borderColor   = isActive ? 'var(--blue)'   : 'var(--border)';
  });

  // 重新計算並渲染
  renderByDate(date);
  closeDP();
}

// ── 根據選定日期重新計算 ──────────────────────
function renderByDate(date){
  const dates = Object.keys(HIST).sort();
  const idx   = dates.indexOf(date);
  const prevDate = idx > 0 ? dates[idx - 1] : date;

  const today_data     = HIST[date]     || {};
  const yesterday_data = HIST[prevDate] || {};

  // 沿用 G 的結構，重新計算 buy/new/sell
  const all_codes = new Set();
  Object.values(today_data).forEach(holdings =>
    holdings.forEach(h => all_codes.add(h.code))
  );

  // 判斷哪些ETF有更新
  const fresh_etfs = Object.keys(today_data).filter(ec => {
    const t = today_data[ec]     || [];
    const y = yesterday_data[ec] || [];
    if(!t.length) return false;
    if(!y.length) return true;
    const ts = new Set(t.map(h => h.code+'_'+Math.round(h.weight*100)));
    const ys = new Set(y.map(h => h.code+'_'+Math.round(h.weight*100)));
    return [...ts].some(v => !ys.has(v)) || [...ys].some(v => !ts.has(v));
  });

  // 計算 stock_map
  const stock_map   = {};
  const removed_list = [];

  for(const ec of fresh_etfs){
    const holdings = today_data[ec]     || [];
    const prev     = Object.fromEntries((yesterday_data[ec]||[]).map(h=>[h.code,h]));
    const today_set= new Set(holdings.map(h=>h.code));
    const etf_name = (G.etf_detail||{})[ec]?.etf_name || ec;

    for(const h of holdings){
      const sc    = h.code; if(!sc) continue;
      const w_now = h.weight;
      const w_prev= prev[sc]?.weight ?? null;
      const is_new= !(sc in prev);
      const wchg  = w_prev !== null ? Math.round((w_now - w_prev)*100)/100 : null;
      const rk    = h.rank || 99;
      const rank_label = rk<=3?'TOP3':rk<=5?'TOP5':rk<=10?'TOP10':'';
      const action= is_new?'new-in': wchg!==null&&wchg<0?'reduce': wchg!==null&&wchg>0?'add':'hold';

      if(!(sc in stock_map)){
        stock_map[sc] = {
          code:sc, name:h.name||STOCK_NAMES[sc]||sc,
          industry:h.industry||'其他',
          price:h.price||null, chg:h.chg||null, chg_pct:h.chg_pct||null,
          etfs:[], total_wchg:0,
          cat: is_new?'new':'buy',
        };
      }
      stock_map[sc].etfs.push({
        etf:ec, etf_name, action, rank:rank_label, rank_num:rk,
        wchg, weight:w_now, prev_weight:w_prev, shares:h.shares||'0',
      });
      if(wchg!==null) stock_map[sc].total_wchg = Math.round((stock_map[sc].total_wchg+wchg)*100)/100;
    }

    // 剔除
    for(const [sc, h] of Object.entries(prev)){
      if(!today_set.has(sc)){
        removed_list.push({
          code:sc, name:h.name||sc, industry:h.industry||'其他',
          etf:ec, etf_name,
          prev_weight:h.weight,
          wchg: Math.round(-h.weight*100)/100,
          price:null, chg_pct:null,
        });
      }
    }
  }

  // 分類
  const buy=[], new_in=[], sell=[];
  for(const s of Object.values(stock_map)){
    const actions = s.etfs.map(e=>e.action);
    const n = s.etfs.length;
    if(actions.every(a=>a==='reduce'||a==='hold') && actions.some(a=>a==='reduce')) s.cat='sell';
    else if(actions.includes('new-in') && n===1) s.cat='new';
    else if(n>=2) s.cat='buy';
    if(s.cat==='sell') sell.push(s);
    else if(s.cat==='new') new_in.push(s);
    else buy.push(s);
  }
  buy.sort((a,b)=>(-b.etfs.length+a.etfs.length)||Math.abs(b.total_wchg)-Math.abs(a.total_wchg));
  new_in.sort((a,b)=>(-b.etfs.length+a.etfs.length)||Math.abs(b.total_wchg)-Math.abs(a.total_wchg));
  sell.sort((a,b)=>a.total_wchg-b.total_wchg);

  // 更新全域 STOCKS
  STOCKS = {};
  [...buy,...new_in,...sell].forEach(s=>STOCKS[s.code]=s);

  // 更新 G 的 buy/new/sell/removed
  G.generated_at  = date;
  G.compare_date  = prevDate;
  G.buy           = buy.slice(0,20);
  G.new           = new_in.slice(0,15);
  G.sell          = sell.slice(0,10);
  G.removed       = removed_list.sort((a,b)=>b.prev_weight-a.prev_weight);
  G.fresh_etfs    = fresh_etfs;
  G.fresh_etf_count = fresh_etfs.length;
  G.stale_etfs    = Object.keys(today_data).filter(ec=>!fresh_etfs.includes(ec));

  render();
}

// 股名備援
const STOCK_NAMES = {};

// ── 主渲染 ──
function render(){
  const {buy=[],new:nw=[],sell=[],removed=[],stale_etfs=[]} = G;
  [...buy,...nw,...sell].forEach(s=>STOCKS[s.code]=s);

  document.getElementById('topbar-date').innerHTML=
    `觀看日期 <b>${G.generated_at||'—'}</b> vs 前日 ${G.compare_date||'—'}`;

  document.getElementById('sumbar').innerHTML=[
    chip('b','共同買進',buy.length,'檔'),
    chip('nw','新進/重納',nw.length,'檔'),
    chip('s','減碼',sell.length,'檔'),
    chip('r','剔除',(removed||[]).length,'檔'),
    chip('e','更新ETF',G.fresh_etf_count||0,'支'),
  ].join('');

  if(stale_etfs&&stale_etfs.length){
    const sb=document.getElementById('stale-bar');
    sb.style.display='';
    sb.textContent=`⚠ 今日資料未更新（已排除統計）：${stale_etfs.join('、')}`;
  }

  let html='';
  if(buy.length)  html+=section('b','多檔共同買進',buy.length,buy.map(d=>card(d,'b')).join(''));
  if(nw.length)   html+=section('nw','新進持股／重新納入',nw.length,nw.map(d=>card(d,'nw')).join(''));
  if(sell.length) html+=section('s','減碼個股',sell.length,sell.map(d=>card(d,'s')).join(''));
  if(!html) html='<div class="no-data">今日尚無變動資料，請執行爬蟲。</div>';
  document.getElementById('radar-content').innerHTML=html+'<div class="pb16"></div>';

  renderRemovedTab();
  renderEtfTab();
  renderAITab();
}

function chip(cls,label,n,unit){
  return `<div class="chip ${cls}"><span class="l">${label}</span><span class="n">${n}</span><span class="l">${unit}</span></div>`;
}
function section(cls,title,count,inner){
  return `<div class="sec"><div class="sec-hd ${cls}"><div class="sec-dot"></div><span class="sec-title">${title}</span><span class="sec-ct">${count}檔</span></div><div class="grid">${inner}</div></div>`;
}
function drc(v){return v>0?'up':v<0?'down':'flat';}
function fmtPct(v,plus=false){
  if(v==null) return '—';
  return (plus&&v>0?'+':'')+Number(v).toFixed(2)+'%';
}
function fmtPp(v){
  if(v==null) return '';
  return (v>0?'+':'')+Number(v).toFixed(2)+'pp';
}

function card(s,cls){
  const dr=drc(s.chg_pct);
  const tags=(s.etfs||[]).map(e=>{
    const rkCls=e.rank==='TOP3'||e.rank==='TOP1'||e.rank==='TOP2'?'t3':e.rank==='TOP4'||e.rank==='TOP5'?'t5':e.rank?'t10':'';
    const rkHtml=e.rank?`<span class="rk ${rkCls}">${e.rank}</span>`:'';
    const wStr=e.wchg!=null?fmtPp(e.wchg):'';
    const wCls=e.wchg!=null?(e.wchg>0?'up':'down'):'';
    return `<span class="etag ${ACT_CSS[e.action]||'hold'}">${e.etf} ${ACT_LBL[e.action]||''}${rkHtml}${wStr?`<span class="wc ${wCls}">${wStr}</span>`:''}</span>`;
  }).join('');
  const tw=s.total_wchg!=null?fmtPp(s.total_wchg):'—';
  const twc=drc(s.total_wchg);
  return `<div class="card ${cls}" id="card-${s.code}" onclick="openDP('${s.code}')">
    <div class="card-top">
      <div><div class="s-code">${s.code}</div><div class="s-name">${s.name||s.code}</div><div class="s-ind">${s.industry||''}</div></div>
      <div class="p-block">
        <div class="price ${dr}">${s.price?Number(s.price).toLocaleString():'—'}</div>
        <div class="pchg ${dr}">${fmtPct(s.chg_pct,true)}</div>
      </div>
    </div>
    <div class="etags">${tags}</div>
    <div class="card-bot">
      <span class="etf-cnt">涉及 <span>${(s.etfs||[]).length}</span> ETF</span>
      <span class="total-wchg ${twc}">${tw}</span>
    </div>
    <div class="hint">點擊查看詳情 →</div>
  </div>`;
}

// ── Tab 切換 ──
function showTab(name,el){
  mainTab=name;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['radar','etf','removed','ai'].forEach(t=>
    document.getElementById('tab-'+t).style.display=t===name?'':'none');
  closeDP();
}

// ── 個股詳情面板（基本框架，詳細內容 Step2 補完） ──
function openDP(code){
  activeCode=code;
  const s=STOCKS[code]||{};
  const dr=drc(s.chg_pct);
  document.getElementById('dp-code').textContent=code;
  document.getElementById('dp-name').textContent=' '+(s.name||'');
  document.getElementById('dp-ind').textContent=s.industry||'';
  document.getElementById('dp-price').className='up';
  document.getElementById('dp-price').className=dr;
  document.getElementById('dp-price').textContent=s.price?Number(s.price).toLocaleString():'—';
  document.getElementById('dp-chg').className=dr;
  document.getElementById('dp-chg').textContent=fmtPct(s.chg_pct,true);

  // 分頁標籤
  document.getElementById('dp-tabs').innerHTML=[
    {k:'kline', lbl:'📈 K線圖'},
    {k:'basic', lbl:'📋 基本資料'},
    {k:'inst',  lbl:'🏦 法人動向'},
    {k:'chart', lbl:'🔄 ETF進出圖'},
    {k:'news',  lbl:'📰 新聞'},
  ].map(t=>`<div class="nav-tab ${dpTab===t.k?'active':''}" style="font-size:11px;padding:7px 14px;" onclick="setDPTab('${t.k}',this)">${t.lbl}</div>`).join('');

  document.getElementById('dp').style.display='block';
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  const cc=document.getElementById('card-'+code);
  if(cc) cc.classList.add('active');
  document.getElementById('dp').scrollIntoView({behavior:'smooth',block:'start'});
  loadDPTab(dpTab);
}

function closeDP(){
  document.getElementById('dp').style.display='none';
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  Object.values(dpCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  dpCharts={};
  activeCode=null;
}

function setDPTab(name,el){
  dpTab=name;
  document.querySelectorAll('#dp-tabs .nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadDPTab(name);
}

// loadDPTab / renderBasic / fetchInst / buildCharts / fetchNews → Step2 補完
function loadDPTab(name){
  if(!activeCode) return;
  Object.values(dpCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  dpCharts={};
  const s=STOCKS[activeCode]||{};
  const body=document.getElementById('dp-body');
  if(name==='kline'){
    body.innerHTML='<div class="loading-screen"><span>載入K線資料...</span></div>';
    if(typeof initKline==='function') initKline(s.code, s.name||s.code);
  }
  else if(typeof renderBasic==='function'&&name==='basic') body.innerHTML=renderBasic(s);
  else if(typeof fetchInst==='function'&&name==='inst'){body.innerHTML='<div class="loading-screen"><span>連線 TWSE...</span></div><div id="inst-result"></div>';fetchInst(s.code);}
  else if(typeof buildCharts==='function'&&name==='chart'){body.innerHTML=chartSkeleton(s);buildCharts(s);}
  else if(typeof fetchNews==='function'&&name==='news'){body.innerHTML='<div class="loading-screen"><span>搜尋新聞...</span></div>';fetchNews(s);}
  else body.innerHTML='<div class="loading-screen"><span>載入中...</span></div>';
}
function chartSkeleton(s){
  return [...new Set((s.etfs||[]).map(e=>e.etf))].map(ec=>
    `<div style="font-family:var(--mono);font-size:10px;color:var(--text3);border-bottom:1px solid var(--border);padding-bottom:4px;margin:10px 0 5px;">${ec}</div>
     <div style="background:var(--bg3);border-radius:6px;padding:10px;margin-bottom:12px;"><canvas id="ec-${ec}-${s.code}"></canvas></div>`
  ).join('')||'<div class="notice">無ETF持倉紀錄</div>';
}

// renderRemovedTab / renderEtfTab / renderAITab → Step3/4 補完
function renderRemovedTab(){
  const removed=G.removed||[];

  if(!removed.length){el.innerHTML='<div class="no-data">今日無完全剔除個股</div>';return;}
  el.innerHTML=removed.map(r=>`

      <div>
        <span style="font-family:var(--mono);font-size:15px;font-weight:600;">${r.code}</span>
        <span style="color:var(--text2);margin-left:8px;">${r.name||r.code}</span>
        <span style="font-size:10px;color:var(--text3);margin-left:6px;">${r.industry||''}</span>
        <div style="margin-top:4px;"><span class="etag removed">${r.etf} ${r.etf_name||''} 完全剔除</span></div>
      </div>
      <div style="text-align:right;">
        <div style="font-family:var(--mono);font-size:11px;color:var(--amber)">昨日 ${Number(r.prev_weight).toFixed(2)}%</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--red);font-weight:700">${fmtPp(r.wchg)}</div>
      </div>
    </div>`).join('');
}
function renderEtfTab(){/* Step3 補完 */}
function renderAITab(){/* Step4 補完 */}

init();
</script>

<script>
// ══════════════════════════════════════════════
// Step 2：個股詳情面板 - 四個分頁完整功能
// ══════════════════════════════════════════════

// ── 基本資料 ──────────────────────────────────
function renderBasic(s){
  const metrics=[
    {l:'股票代號',v:s.code},
    {l:'名稱',v:s.name||'—'},
    {l:'產業',v:s.industry||'—'},
    {l:'股價',v:s.price?Number(s.price).toLocaleString():'—'},
    {l:'漲跌幅',v:fmtPct(s.chg_pct,true),cls:drc(s.chg_pct)},
    {l:'涉及ETF',v:(s.etfs||[]).length+'支'},
    {l:'合計權重變化',v:fmtPp(s.total_wchg)||'—',cls:drc(s.total_wchg)},
  ];
  const cards=metrics.map(m=>
    `<div style="background:var(--bg3);border-radius:5px;padding:7px 10px;">
      <div style="font-size:9px;color:var(--text3);margin-bottom:2px;font-family:var(--mono);">${m.l}</div>
      <div style="font-family:var(--mono);font-size:13px;font-weight:600;" class="${m.cls||''}">${m.v}</div>
    </div>`
  ).join('');

  const etfRows=(s.etfs||[]).map(e=>{
    const wc=e.wchg!=null?fmtPp(e.wchg):'—';
    const wcd=drc(e.wchg);
    const pw=e.prev_weight!=null?Number(e.prev_weight).toFixed(2)+'%':'—';
    const rn=e.rank_num||99;
    const rkCls=rn<=3?'t3':rn<=5?'t5':rn<=10?'t10':'';
    const rkHtml=e.rank?`<span class="rk ${rkCls}">${e.rank}</span>`:'—';
    return `<tr>
      <td style="font-family:var(--mono);font-weight:600">${e.etf}</td>
      <td style="font-size:10px;color:var(--text2)">${e.etf_name||''}</td>
      <td class="act-${ACT_CSS[e.action]||'hold'}">${ACT_LBL[e.action]||'—'}</td>
      <td>${rkHtml}</td>
      <td style="font-family:var(--mono)">${pw} → ${Number(e.weight||0).toFixed(2)}%</td>
      <td class="${wcd}" style="font-family:var(--mono);font-weight:700">${wc}</td>
      <td style="font-family:var(--mono);color:var(--text3)">${Number(e.shares||0).toLocaleString()}張</td>
    </tr>`;
  }).join('');

  return `
  <style>
    .igrid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-bottom:12px;}
    .sub2{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin:10px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--border);}
    .tbl2{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px;}
    .tbl2 th{padding:5px 8px;text-align:left;font-family:var(--mono);font-size:9px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap;}
    .tbl2 td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
    .tbl2 tr:last-child td{border-bottom:none;}
    .tbl2 tr:hover td{background:var(--bg3);}
    .rk{display:inline-block;border-radius:2px;padding:0 4px;font-size:9px;}
    .t3{background:rgba(250,158,11,.15);color:var(--amber);}
    .t5{background:rgba(96,165,250,.12);color:var(--blue);}
    .t10{background:rgba(255,255,255,.06);color:var(--text3);}
    .act-add{color:var(--green);font-weight:600;}
    .act-reduce{color:var(--red);font-weight:600;}
    .act-new-in{color:var(--amber);font-weight:600;}
    .act-removed{color:#fca5a5;}
    .act-hold{color:var(--text3);}
  </style>
  <div class="igrid2">${cards}</div>
  <div class="sub2">各ETF持倉明細</div>
  <div style="overflow-x:auto;border-radius:5px;border:1px solid var(--border);">
    <table class="tbl2" style="margin:0">
      <thead><tr>
        <th>ETF代號</th><th>ETF名稱</th><th>動作</th><th>排名</th>
        <th>昨→今權重</th><th>變化(pp)</th><th>持股張數</th>
      </tr></thead>
      <tbody>${etfRows||'<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:10px">無資料</td></tr>'}</tbody>
    </table>
  </div>`;
}

// ── 法人動向（TWSE 三大法人 API）────────────────
async function fetchInst(code){
  const el=document.getElementById('inst-result');
  if(!el) return;
  try{
    // 自動往前找最近有資料的交易日（最多找10天）
    let data=null, usedDate='';
    const d=new Date();
    const triedDates=[];
    for(let i=0;i<14;i++){
      const dd=new Date(d);
      dd.setDate(d.getDate()-i);
      if(dd.getDay()===0||dd.getDay()===6) continue;
      const dateStr=dd.toISOString().slice(0,10).replace(/-/g,'');
      triedDates.push(dateStr);
      if(triedDates.length>=8) break;
    }

    for(const dateStr of triedDates){
      // 同時嘗試新舊兩個 API 端點
      const urls=[
        `https://www.twse.com.tw/rwd/zh/fund/T86?date=${dateStr}&selectType=ALLBUT0999&response=json`,
        `https://www.twse.com.tw/fund/T86?date=${dateStr}&selectType=ALLBUT0999&response=json`,
      ];
      for(const url of urls){
        try{
          const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
          const d2=await r.json();
          if((d2.stat==='OK'||d2.status==='ok')&&d2.data&&d2.data.length>0){
            data=d2; usedDate=dateStr; break;
          }
        } catch(e2){ /* 繼續嘗試 */ }
      }
      if(data) break;
    }

    if(!data){
      el.previousElementSibling.style.display='none';
      el.innerHTML=`<div class="notice">三大法人資料暫無，盤後18:30更新。<br>
        <a href="https://www.twse.com.tw/zh/trading/fund/T86.html" target="_blank" style="color:var(--blue)">前往TWSE查詢 →</a></div>`;
      return;
    }
    // 支援新舊欄位格式
    const rows=(data.data||[]).filter(row=>(row[0]||'').trim()===code||(row[1]||'').trim()===code);
    if(!rows.length){
      el.previousElementSibling.style.display='none';
      el.innerHTML=`<div class="notice">查無 ${code} 法人資料（${usedDate}）<br>
        可能原因：1.今日未交易 2.此ETF非上市類<br>
        <a href="https://www.twse.com.tw/zh/trading/fund/T86.html" target="_blank" style="color:var(--blue)">前往TWSE查詢 →</a></div>`;
      return;
    }

    const row=rows[0];
    const parse=s=>parseInt((s||'0').replace(/,/g,''))||0;
    const inst=[
      {n:'外資及陸資', buy:parse(row[5]), sell:parse(row[6]), net:parse(row[7])},
      {n:'投信',       buy:parse(row[8]), sell:parse(row[9]), net:parse(row[10])},
      {n:'自營商',     buy:parse(row[11]),sell:parse(row[12]),net:parse(row[13])},
    ];
    const maxV=Math.max(...inst.map(i=>Math.max(i.buy,i.sell)),1);
    const total=inst.reduce((a,i)=>({buy:a.buy+i.buy,sell:a.sell+i.sell,net:a.net+i.net}),{buy:0,sell:0,net:0});

    const tRows=inst.map(i=>{
      const nd=drc(i.net);
      const bw=Math.round(i.buy/maxV*80);
      const sw=Math.round(i.sell/maxV*80);
      return `<tr>
        <td style="color:var(--text2);white-space:nowrap">${i.n}</td>
        <td><div style="display:flex;align-items:center;gap:5px;">
          <div style="width:${bw}px;height:4px;border-radius:2px;background:var(--green);flex-shrink:0;"></div>
          <span class="up" style="font-family:var(--mono)">${i.buy.toLocaleString()}</span>
        </div></td>
        <td><div style="display:flex;align-items:center;gap:5px;">
          <div style="width:${sw}px;height:4px;border-radius:2px;background:var(--red);flex-shrink:0;"></div>
          <span class="down" style="font-family:var(--mono)">${i.sell.toLocaleString()}</span>
        </div></td>
        <td class="${nd}" style="font-family:var(--mono);font-weight:700">${i.net>0?'+':''}${i.net.toLocaleString()}</td>
      </tr>`;
    }).join('');

    const canvasId='inst-chart-'+code;
    el.previousElementSibling.style.display='none';
    el.innerHTML=`
      <div class="sub2" style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin:0 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);">今日三大法人買賣超（張）</div>
      <div style="overflow-x:auto;border-radius:5px;border:1px solid var(--border);margin-bottom:12px;">
        <table class="tbl2" style="margin:0">
          <thead><tr><th>法人</th><th>買進</th><th>賣出</th><th>買賣超</th></tr></thead>
          <tbody>${tRows}</tbody>
          <tfoot><tr style="background:var(--bg3)">
            <td style="padding:5px 8px;font-weight:600">合計</td>
            <td class="up" style="padding:5px 8px;font-family:var(--mono)">${total.buy.toLocaleString()}</td>
            <td class="down" style="padding:5px 8px;font-family:var(--mono)">${total.sell.toLocaleString()}</td>
            <td class="${drc(total.net)}" style="padding:5px 8px;font-family:var(--mono);font-weight:700">${total.net>0?'+':''}${total.net.toLocaleString()}</td>
          </tr></tfoot>
        </table>
      </div>
      <div style="background:var(--bg3);border-radius:6px;padding:10px;position:relative;"><canvas id="${canvasId}" height="160"></canvas></div>`;

    setTimeout(()=>{
      const ctx=document.getElementById(canvasId);
      if(!ctx) return;
      dpCharts[canvasId]=new Chart(ctx,{
        type:'bar',
        data:{
          labels:inst.map(i=>i.n),
          datasets:[
            {label:'買進',data:inst.map(i=>i.buy),backgroundColor:'rgba(34,197,94,.6)',borderRadius:3},
            {label:'賣出',data:inst.map(i=>-i.sell),backgroundColor:'rgba(239,68,68,.6)',borderRadius:3},
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{labels:{color:'#8b92a8',font:{size:10}}},
            tooltip:{callbacks:{label:c=>(c.dataset.label)+': '+Math.abs(c.parsed.y).toLocaleString()+'張'}}
          },
          scales:{
            x:{ticks:{color:'#555e72',font:{size:10}},grid:{color:'#252a35'}},
            y:{ticks:{color:'#555e72',font:{size:10},callback:v=>Math.abs(v).toLocaleString()},grid:{color:'#252a35'}},
          }
        }
      });
    },50);

  } catch(e){
    if(el) el.innerHTML=`<div class="notice">法人資料載入失敗：${e.message}</div>`;
  }
}

// ── ETF進出圖：所有ETF權重合併成一張多線圖 ──────
function buildCharts(s){
  const body = document.getElementById('dp-body');
  const etfCodes = [...new Set((s.etfs||[]).map(e=>e.etf))];
  const dates    = Object.keys(HIST).sort().slice(-10);

  if(!dates.length || !etfCodes.length){
    body.innerHTML = '<div class="notice">歷史資料不足，需累積至少2天後顯示圖表。</div>';
    return;
  }

  const labels = dates.map(d => d.slice(5));

  const LINE_COLORS = [
    '#22c55e','#60a5fa','#f59e0b','#a78bfa','#ef4444',
    '#22d3ee','#fb923c','#f472b6','#a3e635','#94a3b8',
  ];

  // 每支ETF一條折線
  const datasets = etfCodes.map((ec, idx) => {
    const weights = dates.map(date => {
      const holdings = ((HIST[date]||{})[ec]||[]);
      const h = holdings.find(h => h.code === s.code);
      return h ? +Number(h.weight).toFixed(2) : null;
    });
    const color = LINE_COLORS[idx % LINE_COLORS.length];
    return {
      label: ec,
      data: weights,
      borderColor: color,
      backgroundColor: color + '22',
      pointBackgroundColor: weights.map(v =>
        v == null ? 'transparent' : color
      ),
      pointRadius: 5,
      pointHoverRadius: 7,
      borderWidth: 2,
      tension: 0.3,
      spanGaps: false,
      fill: false,
    };
  });

  // 今日各ETF最新權重摘要
  const summaryRows = etfCodes.map((ec, idx) => {
    const color = LINE_COLORS[idx % LINE_COLORS.length];
    const etfEntry = (s.etfs||[]).find(e => e.etf === ec);
    const w     = etfEntry ? Number(etfEntry.weight).toFixed(2)    : '—';
    const wchg  = etfEntry && etfEntry.wchg != null
                  ? (etfEntry.wchg > 0 ? '+' : '') + Number(etfEntry.wchg).toFixed(2) + 'pp'
                  : '—';
    const wCls  = etfEntry && etfEntry.wchg != null
                  ? (etfEntry.wchg > 0 ? 'up' : etfEntry.wchg < 0 ? 'down' : 'flat')
                  : 'flat';
    const act   = etfEntry ? (ACT_LBL[etfEntry.action] || '—') : '—';
    const actCls= etfEntry ? ('act-' + (ACT_CSS[etfEntry.action]||'hold')) : '';
    const rk    = etfEntry && etfEntry.rank ? etfEntry.rank : '';
    return `<tr>
      <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;
                       background:${color};margin-right:4px;vertical-align:middle;"></span>
          <span style="font-family:var(--mono);font-weight:600">${ec}</span></td>
      <td style="font-size:10px;color:var(--text2)">${(s.etfs||[]).find(e=>e.etf===ec)?.etf_name||''}</td>
      <td class="${actCls}">${act}</td>
      <td><span class="rk ${rk.includes('3')||rk==='TOP1'||rk==='TOP2'?'t3':rk==='TOP4'||rk==='TOP5'?'t5':rk?'t10':''}">${rk||'—'}</span></td>
      <td style="font-family:var(--mono);text-align:right;font-weight:600">${w}%</td>
      <td class="${wCls}" style="font-family:var(--mono);text-align:right;font-weight:700">${wchg}</td>
    </tr>`;
  }).join('');

  const canvasId = 'etf-multi-chart-' + s.code;

  body.innerHTML = `
    <div class="sub2" style="font-family:var(--mono);font-size:10px;color:var(--text3);
         letter-spacing:.5px;text-transform:uppercase;margin:0 0 6px;
         padding-bottom:4px;border-bottom:1px solid var(--border);">
      各ETF持倉權重（近10日）
    </div>

    <!-- 合併多線圖 -->
    <div style="background:var(--bg3);border-radius:6px;padding:12px;margin-bottom:12px;position:relative;">

// ── 近期新聞（多備援來源）──────────────────────
async function fetchNews(s){
  const body = document.getElementById('dp-body');
  const code = s.code || '';
  const name = s.name || '';
  const query = encodeURIComponent(`${code} ${name} 台股`);

  body.innerHTML = '<div class="loading-screen"><span>搜尋新聞中...</span></div>';

  // 備援來源順序：rss2json → allorigins → 直接連結
  const rssSrc = `https://news.google.com/rss/search?q=${query}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`;

  const proxies = [
    `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssSrc)}&count=10`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(rssSrc)}`,
    `https://corsproxy.io/?${encodeURIComponent(rssSrc)}`,
  ];

  let items = [];

  // 嘗試 rss2json（回傳 JSON，最穩定）
  try {
    const r = await fetch(proxies[0], { signal: AbortSignal.timeout(10000) });
    const data = await r.json();
    if (data.status === 'ok' && data.items && data.items.length) {
      items = data.items.slice(0, 10).map(item => ({
        title:  item.title || '',
        link:   item.link  || '#',
        date:   item.pubDate ? new Date(item.pubDate).toLocaleDateString('zh-TW') : '',
        source: item.author || '',
      }));
    }
  } catch(e) { /* 繼續嘗試下一個 */ }

  // 備援：allorigins（回傳 XML）
  if (!items.length) {
    for (const proxy of proxies.slice(1)) {
      try {
        const r = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
        const text = await r.text();
        const xml  = new DOMParser().parseFromString(text, 'application/xml');
        const nodes = [...xml.querySelectorAll('item')].slice(0, 10);
        if (nodes.length) {
          items = nodes.map(item => ({
            title:  item.querySelector('title')?.textContent   || '',
            link:   item.querySelector('link')?.textContent    || '#',
            date:   item.querySelector('pubDate')?.textContent
                    ? new Date(item.querySelector('pubDate').textContent).toLocaleDateString('zh-TW')
                    : '',
            source: item.querySelector('source')?.textContent || '',
          }));
          break;
        }
      } catch(e) { /* 繼續 */ }
    }
  }

  // 顯示結果
  if (items.length) {
    const newsHtml = items.map(item => `
      <div style="padding:8px 0;border-bottom:1px solid var(--border);">
        <a href="${item.link}" target="_blank" rel="noopener"
           style="color:var(--blue);text-decoration:none;font-size:12px;line-height:1.6;">
          ${item.title}
        </a>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:2px;">
          ${item.date}${item.source ? ' · ' + item.source : ''}
        </div>
      </div>`).join('');

    body.innerHTML = `
      <div class="sub2" style="font-family:var(--mono);font-size:10px;color:var(--text3);
           letter-spacing:.5px;text-transform:uppercase;margin:0 0 8px;
           padding-bottom:4px;border-bottom:1px solid var(--border);">
        近期相關新聞（${code} ${name}）
      </div>
      ${newsHtml}
      <div style="text-align:center;margin-top:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <a href="https://news.google.com/search?q=${query}&hl=zh-TW"
           target="_blank"
           style="color:var(--blue);font-size:11px;font-family:var(--mono);">
          Google 新聞 →
        </a>
        <a href="https://tw.stock.yahoo.com/quote/${code}/news"
           target="_blank"
           style="color:var(--blue);font-size:11px;font-family:var(--mono);">
          Yahoo 股市新聞 →
        </a>
        <a href="https://www.cnyes.com/twstock/ps_page/${code}"
           target="_blank"
           style="color:var(--blue);font-size:11px;font-family:var(--mono);">
          鉅亨網 →
        </a>
      </div>`;
  } else {
    // 全部失敗 → 顯示外部連結
    body.innerHTML = `
      <div class="notice">新聞自動載入失敗，請點選以下連結查詢：</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">
        <a href="https://news.google.com/search?q=${query}&hl=zh-TW"
           target="_blank"
           style="display:flex;align-items:center;gap:8px;background:var(--bg3);
                  border:1px solid var(--border);border-radius:6px;padding:10px 14px;
                  color:var(--blue);text-decoration:none;font-size:12px;">
          📰 Google 新聞：${code} ${name}
        </a>
        <a href="https://tw.stock.yahoo.com/quote/${code}/news"
           target="_blank"
           style="display:flex;align-items:center;gap:8px;background:var(--bg3);
                  border:1px solid var(--border);border-radius:6px;padding:10px 14px;
                  color:var(--blue);text-decoration:none;font-size:12px;">
          📰 Yahoo 股市：${code} ${name}
        </a>
        <a href="https://www.cnyes.com/twstock/ps_page/${code}"
           target="_blank"
           style="display:flex;align-items:center;gap:8px;background:var(--bg3);
                  border:1px solid var(--border);border-radius:6px;padding:10px 14px;
                  color:var(--blue);text-decoration:none;font-size:12px;">
          📰 鉅亨網：${code} ${name}
        </a>
      </div>`;
  }
}

function renderEtfTab(){

function showEtfDetail(code){

  // 按鈕樣式切換
  document.querySelectorAll('[id^="epill-"]').forEach(b=>{
    b.style.background='var(--bg3)';

    active.style.borderColor='var(--blue)';
    active.style.color='var(--blue)';

  const d=(G.etf_detail||{})[code];
  if(!d) return;

  const freshLabel=d.is_fresh
    ?'<span style="color:var(--green);font-family:var(--mono);font-size:10px;">✓ 今日已更新</span>'

  // 產業分布統計

    const ind=h.industry||'其他';
    indMap[ind]=(indMap[ind]||0)+h.weight;
  });

    .sort((a,b)=>b[1]-a[1]).slice(0,10);

    const rkLabel=rn<=10?'TOP'+rn:'';

    const stockInRadar=STOCKS[h.code];

      ?`<span class="act-${ACT_CSS[etfEntry.action]||'hold'}">${ACT_LBL[etfEntry.action]||'—'}</span>

          ${etfEntry.wchg!=null?fmtPp(etfEntry.wchg):''}
        </span>`
      :'<span style="color:var(--text3)">—</span>';

    return `<tr onclick="openStockFromEtf('${h.code}')" style="cursor:pointer;">
      <td style="font-family:var(--mono);color:var(--text3);text-align:center">${rn}</td>
      <td><span class="rk ${rkCls}">${rkLabel}</span></td>
      <td style="font-family:var(--mono);font-weight:600;color:var(--text)">${h.code}</td>
      <td style="max-width:80px;overflow:hidden;text-overflow:ellipsis;">${h.name||h.code}</td>
      <td style="font-size:10px;color:var(--text3)">${h.industry||'—'}</td>
      <td style="font-family:var(--mono);text-align:right;font-weight:600">${Number(h.weight||0).toFixed(2)}%</td>
      <td>${actionHtml}</td>
      <td class="${dr}" style="font-family:var(--mono);text-align:right;font-weight:600">${fmtPct(h.chg_pct,true)}</td>
      <td style="font-family:var(--mono);text-align:right">${h.price?Number(h.price).toLocaleString():'—'}</td>
      <td style="font-family:var(--mono);text-align:right;color:var(--text3)">${Number(h.shares||0).toLocaleString()}</td>
    </tr>`;
  }).join('');

  document.getElementById('etf-content').innerHTML=`
    <style>
      .etf-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}

      .etf-tbl{width:100%;border-collapse:collapse;font-size:11px;}
      .etf-tbl th{padding:5px 8px;text-align:left;font-family:var(--mono);font-size:9px;color:var(--text3);
                  border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap;}
      .etf-tbl td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
      .etf-tbl tr:last-child td{border-bottom:none;}
      .etf-tbl tr:hover td{background:var(--bg3);}
      .ind-chart-wrap{background:var(--bg3);border-radius:6px;padding:10px;margin-bottom:12px;position:relative;}
    </style>

    <div class="etf-meta">
      <span style="font-size:14px;font-weight:600;font-family:var(--mono)">${code}</span>
      <span style="color:var(--text2)">${d.etf_name||''}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">資料日期: ${d.data_date||'—'}</span>
      ${freshLabel}
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">共 ${d.total||0} 檔持股</span>
    </div>

    <div class="ind-chart-wrap" style="height:${Math.max(160, indSorted.length*28)}px;">
      <canvas id="${indChartId}"></canvas>
    </div>

    <!-- 持股明細表 -->
    <div class="etf-tbl-wrap">
      <table class="etf-tbl">
        <thead><tr>

          <th>排名</th>
          <th>代號</th>
          <th>名稱</th>
          <th>產業</th>
          <th style="text-align:right">權重</th>
          <th>今日動作</th>
          <th style="text-align:right">漲跌</th>
          <th style="text-align:right">股價</th>
          <th style="text-align:right">持股(張)</th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="10" style="text-align:center;padding:12px;color:var(--text3)">無持股資料</td></tr>'}</tbody>
      </table>
    </div>`;

  // 渲染產業分布橫條圖
  setTimeout(()=>{
    const ctx=document.getElementById(indChartId);
    if(!ctx) return;
    const existing=Chart.getChart(ctx);
    if(existing) existing.destroy();

    const COLORS=[
      'rgba(96,165,250,.7)','rgba(34,197,94,.7)','rgba(250,158,11,.7)',
      'rgba(167,139,250,.7)','rgba(239,68,68,.7)','rgba(34,211,238,.7)',
      'rgba(251,146,60,.7)','rgba(163,230,53,.7)','rgba(244,114,182,.7)','rgba(148,163,184,.7)',
    ];

    new Chart(ctx,{
      type:'bar',
      data:{
        labels:indSorted.map(i=>i[0]),
        datasets:[{
          label:'產業合計權重(%)',
          data:indSorted.map(i=>+i[1].toFixed(2)),
          backgroundColor:indSorted.map((_,i)=>COLORS[i%COLORS.length]),
          borderColor:indSorted.map((_,i)=>COLORS[i%COLORS.length].replace('.7','1')),
          borderWidth:1,
          borderRadius:3,
        }]
      },
      options:{
        indexAxis:'y',
        responsive:true,
        maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>c.parsed.x.toFixed(2)+'%'}}
        },
        scales:{
          x:{
            ticks:{color:'#555e72',font:{size:10},callback:v=>v+'%'},
            grid:{color:'#252a35'},
          },
          y:{
            ticks:{color:'#8b92a8',font:{size:10}},
            grid:{color:'#252a35'},
          }
        }
      }
    });
  },60);
}

// 從ETF明細頁點擊個股 → 開啟詳情面板
function openStockFromEtf(code){
  if(STOCKS[code]){
    // 先切回雷達榜頁再開面板
    openDP(code);
    document.getElementById('dp').scrollIntoView({behavior:'smooth',block:'start'});
  } else {
    // 不在雷達榜中（無變動）→ 建立臨時物件
    const etfDetail=G.etf_detail||{};
    for(const ec of Object.keys(etfDetail)){
      const h=(etfDetail[ec].holdings||[]).find(h=>h.code===code);
      if(h){
        STOCKS[code]={...h, etfs:[], total_wchg:0};
        break;
      }
    }
    if(STOCKS[code]) openDP(code);
  }
}
</script>

function quickAsk(msg){
  if(!aiHistory.length){
    // 先確保有context
    const summary=G.ai_summary||'無資料';
    aiHistory=[{role:'user',content:`以下是今日台灣主動ETF完整進出資料：\n\n${summary}\n\n${msg}`}];
  } else {
    aiHistory.push({role:'user',content:msg});
  }
  const body=document.getElementById('ai-body');
  const btn=document.getElementById('ai-run-btn');
  if(!body||!btn) return;
  body.className='ai-body thinking';
  body.textContent='▶ 思考中...';
  btn.disabled=true;
  callClaude(body,btn);
}

// ── 開始完整分析 ──
async function runAI(){
  const btn=document.getElementById('ai-run-btn');
  const body=document.getElementById('ai-body');
  if(!btn||!body) return;
  btn.disabled=true;
  body.className='ai-body thinking';
  body.textContent='▶ AI分析中，請稍候（約15~30秒）...';

  const summary=G.ai_summary||'（無資料）';
  const prompt=`你是一位專業的台股投資分析師。以下是今日台灣主動式ETF完整進出資料：

${summary}

請分析並回答：
1. 【大盤趨勢判斷】全體ETF經理人的進出方向，整體偏多、偏空還是分歧？說明依據。
2. 【今日押寶產業】哪些產業被多支ETF同步加碼？為何受青睞？
3. 【今日迴避產業】哪些產業被減碼或剔除？可能原因？
4. 【重點個股】值得關注的買進個股2~3支、賣出個股1~2支，各說明理由。
5. 【投資方向總結】用2~3句話總結近期台股主動ETF整體投資方向。

請用繁體中文，條列式，每點精準簡短。`;

  aiHistory=[{role:'user',content:prompt}];
  await callClaude(body,btn);
}

// ── 追問 ──
async function sendAI(){
  const input=document.getElementById('ai-input');
  const body=document.getElementById('ai-body');
  const btn=document.getElementById('ai-run-btn');
  const msg=(input?.value||'').trim();
  if(!msg) return;
  input.value='';

  if(!aiHistory.length){
    // 尚未分析過，先帶入context
    const summary=G.ai_summary||'無資料';
    aiHistory=[{role:'user',content:`以下是今日台灣主動ETF完整進出資料：\n\n${summary}`},
               {role:'assistant',content:'已收到資料，請問你想了解什麼？'},
               {role:'user',content:msg}];
  } else {
    aiHistory.push({role:'user',content:msg});
  }

  body.className='ai-body thinking';
  body.textContent='▶ 思考中...';
  btn.disabled=true;
  await callClaude(body,btn);
}

// ── 呼叫 Claude API ──async function callClaude(body, btn){
  if (!GEMINI_KEY){
    body.className = 'ai-body';
    const summary = (G.ai_summary||'').slice(0, 800);
    body.innerHTML = `<div class="notice" style="margin-bottom:10px;">
      ⚠ 尚未設定 Gemini API Key。<br>
      請編輯 <code>index.html</code> 頂端的 <code>GEMINI_KEY</code>，填入你的 API Key。<br>
      免費申請：<a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--purple)">aistudio.google.com/apikey</a><br><br>
      或將以下資料複製到
      <a href="https://gemini.google.com" target="_blank" style="color:var(--purple)">gemini.google.com</a> 詢問：
    </div>
    <pre style="font-size:10px;color:var(--text2);white-space:pre-wrap;
                background:var(--bg3);padding:10px;border-radius:5px;
                overflow-x:auto;max-height:300px;">${summary}...</pre>`;
    btn.disabled = false;
    return;
  }
  try{
    // 轉換 aiHistory 格式為 Gemini 格式
    const geminiContents = aiHistory.map(m=>({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts:[{text: m.content}]
    }));

    const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`;
    const r = await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents: geminiContents,
        generationConfig:{
          maxOutputTokens: 1500,
          temperature: 0.7,
        }
      })
    });
    if (!r.ok){
      const err = await r.json().catch(()=>({}));
      throw new Error(err?.error?.message || `HTTP ${r.status}`);
    }
    const data  = await r.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '（無回應）';
    aiHistory.push({role:'assistant', content:reply});
    body.className = 'ai-body';
    body.innerHTML = reply
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  } catch(e){
    body.className = 'ai-body';
    body.innerHTML = `<div class="notice">Gemini API 呼叫失敗：${e.message}<br>
      請確認 API Key 正確。免費申請：
      <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--purple)">aistudio.google.com/apikey</a>
    </div>`;
  } finally{
    if (btn) btn.disabled = false;
  }
}

<script>
// ══════════════════════════════════════════════
// Step A：K線圖 + 成交量 + 技術指標參數設定
// ══════════════════════════════════════════════

// ── 技術指標參數（可手動修改）────────────────
let PARAMS = {
  ma:   [5, 20, 60],        // MA 均線天數
  kd_n: 9,                  // KD 週期
  kd_m1: 3,                 // KD M1
  kd_m2: 3,                 // KD M2
  macd_fast: 12,            // MACD 快線
  macd_slow: 26,            // MACD 慢線
  macd_signal: 9,           // MACD 訊號線
  vol_ma: 5,                // 成交量 MA 天數
};

const MA_COLORS = ['#f59e0b','#22c55e','#a78bfa','#f472b6','#22d3ee'];

// ── 抓取 TWSE 歷史資料（近3個月）────────────
async function fetchTWSEHistory(code){
  const now   = new Date();
  const allData = [];

  // 抓近3個月資料
  for(let i = 2; i >= 0; i--){
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const dateStr = d.getFullYear().toString()
      + String(d.getMonth()+1).padStart(2,'0') + '01';
    const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${dateStr}&stockNo=${code}`;
    try{
      const r = await fetch(url, {signal: AbortSignal.timeout(10000)});
      const json = await r.json();
      if(json.stat === 'OK' && json.data){
        for(const row of json.data){
          // row: [日期, 成交股數, 成交金額, 開盤價, 最高價, 最低價, 收盤價, 漲跌價差, 成交筆數]
          const dateRaw = row[0]; // 民國年 e.g. "115/04/01"
          const parts   = dateRaw.split('/');
          const year     = parseInt(parts[0]) + 1911;
          const dateISO  = `${year}-${parts[1]}-${parts[2]}`;
          const open     = parseFloat(row[3].replace(/,/g,''));
          const high     = parseFloat(row[4].replace(/,/g,''));
          const low      = parseFloat(row[5].replace(/,/g,''));
          const close    = parseFloat(row[6].replace(/,/g,''));
          const vol      = parseInt(row[1].replace(/,/g,'')) / 1000; // 張
          const amount   = parseInt(row[2].replace(/,/g,''));
          const txCount  = parseInt(row[8].replace(/,/g,''));
          if(!isNaN(open) && !isNaN(close)){
            allData.push({date:dateISO, open, high, low, close, vol, amount, txCount});
          }
        }
      }
    } catch(e){ /* 略過該月 */ }
  }
  return allData;
}

// ── 計算 MA ───────────────────────────────────
function calcMA(closes, n){
  return closes.map((_, i) =>
    i < n-1 ? null : closes.slice(i-n+1, i+1).reduce((a,b)=>a+b,0)/n
  );
}

// ── 計算 KD（隨機指標）───────────────────────
function calcKD(data, n, m1, m2){
  const K=[], D=[], RSV=[];
  let prevK=50, prevD=50;
  for(let i=0;i<data.length;i++){
    const slice = data.slice(Math.max(0,i-n+1), i+1);
    const hh = Math.max(...slice.map(d=>d.high));
    const ll  = Math.min(...slice.map(d=>d.low));
    const rsv = hh===ll ? 50 : (data[i].close-ll)/(hh-ll)*100;
    const k   = (prevK*(m1-1) + rsv) / m1;
    const d   = (prevD*(m2-1) + k)   / m2;
    RSV.push(+rsv.toFixed(2));
    K.push(+k.toFixed(2));
    D.push(+d.toFixed(2));
    prevK=k; prevD=d;
  }
  return {K, D, RSV};
}

// ── 計算 MACD ────────────────────────────────
function calcMACD(closes, fast, slow, signal){
  function ema(arr, n){
    const result=[];
    let prev = arr.slice(0,n).reduce((a,b)=>a+b,0)/n;
    for(let i=0;i<arr.length;i++){
      if(i<n-1){ result.push(null); continue; }
      if(i===n-1){ result.push(+prev.toFixed(4)); continue; }
      prev = prev*(n-1)/(n+1) + arr[i]*2/(n+1);
      result.push(+prev.toFixed(4));
    }
    return result;
  }
  const EMA_FAST   = ema(closes, fast);
  const EMA_SLOW   = ema(closes, slow);
  const DIF = EMA_FAST.map((f,i)=> f!=null&&EMA_SLOW[i]!=null ? +(f-EMA_SLOW[i]).toFixed(4) : null);
  const difClean   = DIF.filter(v=>v!=null);
  const sigRaw     = ema(difClean, signal);
  // 補齊 null 前綴
  const sigPadLen  = DIF.filter(v=>v==null).length;
  const SIG = [...Array(sigPadLen).fill(null), ...sigRaw];
  const HIST = DIF.map((d,i)=> d!=null&&SIG[i]!=null ? +(d-SIG[i]).toFixed(4) : null);
  return {DIF, SIG, HIST};
}

// ── 主入口：初始化K線頁 ──────────────────────
async function initKline(code, name){
  const body = document.getElementById('dp-body');

  // 先顯示參數設定 + 載入中
  body.innerHTML = buildKlineParamUI(code, name)
    + `<div id="kline-loading" class="loading-screen"><span>載入 ${code} 歷史資料...</span></div>`
    + `<div id="kline-area" style="display:none;"></div>`;

  const data = await fetchTWSEHistory(code);

  document.getElementById('kline-loading').style.display='none';

  if(!data.length){
    document.getElementById('kline-area').innerHTML =
      `<div class="notice">⚠ 無法取得 ${code} 歷史資料，請確認股票代號正確。</div>`;
    document.getElementById('kline-area').style.display='';
    return;
  }

  window._klineData = data; // 快取供重繪使用
  window._klineCode = code;
  window._klineName = name;
  renderKline(data);
}

function buildKlineParamUI(code, name){
  return `
  <style>
    .param-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
               padding:8px 12px;background:var(--bg3);border-radius:6px;
               margin-bottom:10px;border:1px solid var(--border);}
    .param-bar label{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;}
    .param-input{background:var(--bg);border:1px solid var(--border2);border-radius:4px;
                 color:var(--text);font-family:var(--mono);font-size:11px;
                 padding:3px 6px;width:52px;text-align:center;outline:none;}
    .param-input:focus{border-color:var(--cyan);}
    .param-apply{background:var(--cyan);color:#000;border:none;border-radius:4px;
                 padding:4px 12px;font-family:var(--mono);font-size:11px;
                 font-weight:600;cursor:pointer;}
    .param-apply:hover{opacity:.85;}
    .param-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
    .kline-wrap{background:var(--bg3);border-radius:6px;padding:10px;margin-bottom:8px;}
  </style>
  <div class="param-bar">
    <label>MA均線</label>
    <input class="param-input" id="pm-ma1" value="${PARAMS.ma[0]}" title="MA1天數">
    <input class="param-input" id="pm-ma2" value="${PARAMS.ma[1]}" title="MA2天數">
    <input class="param-input" id="pm-ma3" value="${PARAMS.ma[2]}" title="MA3天數">
    <div class="param-divider"></div>
    <label>KD</label>
    <input class="param-input" id="pm-kd-n"  value="${PARAMS.kd_n}"  title="KD週期N">
    <input class="param-input" id="pm-kd-m1" value="${PARAMS.kd_m1}" title="KD M1">
    <input class="param-input" id="pm-kd-m2" value="${PARAMS.kd_m2}" title="KD M2">
    <div class="param-divider"></div>
    <label>MACD</label>
    <input class="param-input" id="pm-mf" value="${PARAMS.macd_fast}"   title="快線EMA">
    <input class="param-input" id="pm-ms" value="${PARAMS.macd_slow}"   title="慢線EMA">
    <input class="param-input" id="pm-mg" value="${PARAMS.macd_signal}" title="訊號線">
    <div class="param-divider"></div>
    <label>量MA</label>
    <input class="param-input" id="pm-vm" value="${PARAMS.vol_ma}" title="成交量MA天數">
    <button class="param-apply" onclick="applyParams()">套用</button>
  </div>`;
}

function applyParams(){
  const v = id => parseInt(document.getElementById(id)?.value)||0;
  PARAMS.ma        = [v('pm-ma1'), v('pm-ma2'), v('pm-ma3')].filter(n=>n>0);
  PARAMS.kd_n      = v('pm-kd-n')  || 9;
  PARAMS.kd_m1     = v('pm-kd-m1') || 3;
  PARAMS.kd_m2     = v('pm-kd-m2') || 3;
  PARAMS.macd_fast = v('pm-mf')    || 12;
  PARAMS.macd_slow = v('pm-ms')    || 26;
  PARAMS.macd_signal = v('pm-mg')  || 9;
  PARAMS.vol_ma    = v('pm-vm')    || 5;
  if(window._klineData) renderKline(window._klineData);
}

function renderKline(data){
  // 銷毀舊圖
  Object.keys(dpCharts).forEach(k=>{
    if(k.startsWith('kl-')){try{dpCharts[k].destroy();}catch(e){} delete dpCharts[k];}
  });

  const area = document.getElementById('kline-area');
  area.style.display='';
  area.innerHTML = `
    <div class="kline-wrap" style="height:260px;"><canvas id="kl-main"></canvas></div>
    <div class="kline-wrap" style="height:100px;"><canvas id="kl-vol"></canvas></div>`;

  const labels  = data.map(d=>d.date.slice(5));
  const closes  = data.map(d=>d.close);
  const opens   = data.map(d=>d.open);
  const highs   = data.map(d=>d.high);
  const lows    = data.map(d=>d.low);
  const vols    = data.map(d=>d.vol);

  // MA 計算
  const maDatasets = PARAMS.ma.map((n,i)=>({
    label:`MA${n}`,
    data: calcMA(closes, n),
    borderColor: MA_COLORS[i],
    backgroundColor:'transparent',
    borderWidth:1.5,
    pointRadius:0,
    tension:0.3,
    spanGaps:true,
    type:'line',
    yAxisID:'y',
    order: 1,
  }));

  // K線（用自訂 float bar 模擬蠟燭）
  const candleData = data.map(d=>({
    x: d.date.slice(5),
    o: d.open, h: d.high, l: d.low, c: d.close,
  }));

  // 漲跌顏色
  const upColor   = 'rgba(239,68,68,.85)';
  const downColor = 'rgba(34,197,94,.85)';
  const candleColors = data.map(d=>d.close>=d.open?upColor:downColor);

  // ── 主圖（K線模擬：用 bar 畫高低，line 畫開收）──
  const chartMain = new Chart(document.getElementById('kl-main'),{
    type:'bar',
    data:{
      labels,
      datasets:[
        // 影線（high-low）
        {
          label:'High-Low',
          data: data.map(d=>d.high - d.low),
          base: lows,
          backgroundColor: candleColors,
          borderWidth: 0,
          barThickness: 1,
          categoryPercentage: 0.3,
          order: 3,
          yAxisID:'y',
        },
        // 實體（open-close）
        {
          label:'Open-Close',
          data: data.map(d=>Math.abs(d.close-d.open)||0.01),
          base: data.map(d=>Math.min(d.open,d.close)),
          backgroundColor: candleColors,
          borderColor: candleColors,
          borderWidth: 0.5,
          categoryPercentage: 0.7,
          barPercentage: 0.85,
          order: 2,
          yAxisID:'y',
        },
        ...maDatasets,
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      animation:{duration:0},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          labels:{
            color:'#8b92a8', font:{size:10},
            filter: item => !['High-Low','Open-Close'].includes(item.text),
          }
        },
        tooltip:{
          callbacks:{
            title: items => data[items[0].dataIndex]?.date||'',
            label: item => {
              const d=data[item.dataIndex];
              if(!d) return null;
              if(item.datasetIndex===0) return [
                `開:${d.open}  高:${d.high}`,
                `低:${d.low}  收:${d.close}`,
                `漲跌:${+(d.close-d.open).toFixed(2)} (${+((d.close-d.open)/d.open*100).toFixed(2)}%)`,
              ];
              if(item.datasetIndex===1) return null;
              return `${item.dataset.label}: ${item.parsed.y!=null?item.parsed.y.toFixed(2):'—'}`;
            },
            filter: item => item.datasetIndex !== 1,
          }
        }
      },
      scales:{
        x:{ticks:{color:'#555e72',font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:12},grid:{color:'#252a35'}},
        y:{position:'right',ticks:{color:'#555e72',font:{size:9}},grid:{color:'#252a35'}},
      }
    }
  });
  dpCharts['kl-main'] = chartMain;

  // ── 成交量圖 ─────────────────────────────────
  const volMA = calcMA(vols, PARAMS.vol_ma);
  const volColors = data.map(d=>d.close>=d.open?'rgba(239,68,68,.6)':'rgba(34,197,94,.6)');
  const chartVol = new Chart(document.getElementById('kl-vol'),{
    type:'bar',
    data:{
      labels,
      datasets:[
        {
          label:'成交量(張)',
          data:vols,
          backgroundColor:volColors,
          borderWidth:0,
          barPercentage:0.85,
          yAxisID:'y',
          order:2,
        },
        {
          type:'line',
          label:`量MA${PARAMS.vol_ma}`,
          data:volMA,
          borderColor:'#f59e0b',
          backgroundColor:'transparent',
          pointRadius:0,
          borderWidth:1.5,
          spanGaps:true,
          yAxisID:'y',
          order:1,
        }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      animation:{duration:0},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#8b92a8',font:{size:10}}},
        tooltip:{callbacks:{
          label:item=> item.dataset.label+': '+(item.parsed.y!=null?Math.round(item.parsed.y).toLocaleString():'—')+(item.datasetIndex===0?'張':'')
        }}
      },
      scales:{
        x:{ticks:{color:'#555e72',font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:12},grid:{color:'#252a35'}},
        y:{position:'right',ticks:{color:'#555e72',font:{size:9},callback:v=>v>=1000?Math.round(v/1000)+'k':v},grid:{color:'#252a35'}},
      }
    }
  });
  dpCharts['kl-vol'] = chartVol;
}
</script>
